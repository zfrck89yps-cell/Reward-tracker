<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#101114">
<title>Reward Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#0f1013;--panel:#181a20;--panel2:#23262e;--text:#f5f6f8;--muted:#a9afba;--line:#31353e;--accent:#8be36d;--danger:#ff8080;--warn:#ffd166;--paid:#7ce4c2;--r:17px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}button,input,select,textarea{font:inherit}.app{max-width:760px;margin:auto;padding:20px 14px 105px}header{display:flex;justify-content:space-between;gap:16px;align-items:start;margin-bottom:18px}h1{font-size:1.7rem;margin:0 0 5px}.sub,.muted{color:var(--muted)}.sub{margin:0;font-size:.92rem}.money{text-align:right;white-space:nowrap}.money strong{display:block;color:var(--accent);font-size:1.4rem}.money span{font-size:.78rem;color:var(--muted)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}.summary>div{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px}.summary strong{display:block;font-size:1.1rem}.summary span{font-size:.75rem;color:var(--muted)}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:var(--panel);border:1px solid var(--line);padding:4px;border-radius:14px;position:sticky;top:8px;z-index:4}.tab{border:0;background:transparent;color:var(--muted);padding:10px 4px;border-radius:10px;font-weight:750;font-size:.78rem}.tab.on{background:var(--panel2);color:var(--text)}#list{display:grid;gap:12px;margin-top:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px}.top{display:flex;justify-content:space-between;gap:12px}.card h3{margin:0;font-size:1.05rem}.game{color:var(--muted);font-size:.83rem;margin-top:4px}.reward{color:var(--accent);font-weight:850}.deadline{display:inline-block;background:var(--panel2);color:var(--muted);padding:6px 9px;border-radius:999px;margin-top:10px;font-size:.78rem}.deadline.warn{color:var(--warn)}.deadline.late{color:var(--danger)}.prog{margin-top:13px}.plabel{display:flex;justify-content:space-between;color:var(--muted);font-size:.8rem;margin-bottom:6px}.bar{height:10px;border-radius:999px;background:#2b2e36;overflow:hidden}.bar i{display:block;height:100%;background:var(--accent);border-radius:inherit}.notes{font-size:.85rem;color:var(--muted);margin-top:11px;line-height:1.4}.log{border-top:1px solid var(--line);margin-top:12px;padding-top:6px}.log div{display:flex;justify-content:space-between;gap:10px;padding:6px 0;color:var(--muted);font-size:.8rem}.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:10px;padding:8px 10px;font-weight:750}.btn.primary{background:var(--accent);color:#0c1609;border-color:transparent}.btn.paid{background:var(--paid);color:#071612;border-color:transparent}.btn.danger{color:var(--danger)}.empty{text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:var(--r);padding:35px 20px}.fab{position:fixed;right:max(18px,calc((100vw - 760px)/2 + 18px));bottom:calc(18px + env(safe-area-inset-bottom));border:0;border-radius:999px;padding:14px 18px;background:var(--accent);color:#0c1609;font-weight:900;box-shadow:0 12px 35px #0008}.tools{display:flex;gap:8px;margin-top:14px}.hidden{display:none}dialog{width:min(92vw,560px);background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:20px;padding:0}dialog::backdrop{background:#000b}.modal{padding:18px}.modal h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field{display:grid;gap:6px}.full{grid-column:1/-1}label{font-size:.8rem;font-weight:750;color:var(--muted)}input,select,textarea{width:100%;background:#101217;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:11px}textarea{min-height:80px;resize:vertical}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}@media(max-width:520px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.summary{gap:6px}.summary>div{padding:9px 7px}.tab{font-size:.72rem}}
</style>
</head>
<body>
<main class="app">
<header><div><h1>Reward Tracker</h1><p class="sub">Track the game. Chase the money. Avoid spreadsheet nonsense.</p></div><div class="money"><strong id="paidTotal">£0.00</strong><span>paid so far</span></div></header>
<section class="summary"><div><strong id="activeCount">0</strong><span>to complete</span></div><div><strong id="pendingTotal">£0.00</strong><span>pending</span></div><div><strong id="activeValue">£0.00</strong><span>active value</span></div></section>
<nav class="tabs"><button class="tab on" data-tab="active">To complete</button><button class="tab" data-tab="pending">Pending</button><button class="tab" data-tab="paid">Paid</button><button class="tab" data-tab="incomplete">Incomplete</button></nav>
<section id="list"></section>
<section class="tools"><button class="btn" id="exportBtn">Export backup</button><label class="btn" for="importFile">Import backup</label><input class="hidden" id="importFile" type="file" accept="application/json"></section>
</main>
<button class="fab" id="addBtn">＋ Add task</button>
<dialog id="taskDialog"><form class="modal" id="taskForm"><h2 id="dialogTitle">Add reward task</h2><input type="hidden" id="taskId"><div class="grid">
<div class="field full"><label>Task</label><input id="taskName" required placeholder="Reach level 20"></div>
<div class="field"><label>Game / offer</label><input id="gameName" placeholder="Bingo Blitz"></div>
<div class="field"><label>Reward (£)</label><input id="reward" type="number" min="0" step="0.01" required></div>
<div class="field"><label>Counting</label><select id="type"><option value="levels">Levels</option><option value="wins">Cash tournament wins</option><option value="tasks">Tasks / milestones</option><option value="custom">Custom</option></select></div>
<div class="field"><label>Target</label><input id="target" type="number" min="1" step="1" value="1" required></div>
<div class="field"><label>Starting progress</label><input id="current" type="number" min="0" step="1" value="0"></div>
<div class="field"><label>Deadline</label><input id="deadline" type="datetime-local" required></div>
<div class="field full"><label>Notes</label><textarea id="notes" placeholder="Offer terms, tracking warning, screenshots taken..."></textarea></div></div>
<div class="modal-actions"><button class="btn" type="button" id="cancelTask">Cancel</button><button class="btn primary">Save task</button></div></form></dialog>
<dialog id="progressDialog"><form class="modal" id="progressForm"><h2>Add progress</h2><input type="hidden" id="progressId"><div class="field"><label>How many did you gain?</label><input id="amount" type="number" min="1" step="1" value="1" required></div><div class="field" style="margin-top:11px"><label>Note</label><input id="progressNote" placeholder="Reached level 14"></div><div class="modal-actions"><button class="btn" type="button" id="cancelProgress">Cancel</button><button class="btn primary">Add</button></div></form></dialog>
<script>
const KEY='rewardTracker.v1';let tasks=JSON.parse(localStorage.getItem(KEY)||'[]'),tab='active';const $=x=>document.getElementById(x),money=n=>new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP'}).format(+n||0),uid=()=>crypto.randomUUID?.()||Date.now()+''+Math.random();
function save(){localStorage.setItem(KEY,JSON.stringify(tasks))}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function inputDate(d){let x=new Date(d.getTime()-d.getTimezoneOffset()*60000);return x.toISOString().slice(0,16)}function defaultDate(){let d=new Date;d.setDate(d.getDate()+7);d.setHours(23,59,0,0);return inputDate(d)}
function expire(){let changed=false,now=Date.now();tasks.forEach(t=>{if(t.status==='active'&&new Date(t.deadline)<now){t.status='incomplete';t.updatedAt=new Date().toISOString();changed=true}});if(changed)save()}
function left(d){let ms=new Date(d)-Date.now(),h=Math.ceil(Math.abs(ms)/36e5),days=Math.ceil(Math.abs(ms)/864e5);return ms<0?(h<24?h+'h overdue':days+'d overdue'):(h<=24?h+'h left':days+'d left')}function dclass(d){let ms=new Date(d)-Date.now();return ms<0?'late':ms<1728e5?'warn':''}function label(t){return({levels:'levels',wins:'wins',tasks:'tasks',custom:'completed'})[t.type]||'completed'}
function statusText(s){return({pending:'Pending payment',paid:'Reward honoured',incomplete:'Incomplete'})[s]||s}
function card(t){let pct=Math.min(100,Math.round(t.current/t.target*100)),logs=(t.log||[]).slice().reverse().slice(0,4),actions=t.status==='active'?`<button class="btn primary" data-a="progress" data-id="${t.id}">＋ Progress</button><button class="btn" data-a="pending" data-id="${t.id}">Mark completed</button>`:t.status==='pending'?`<button class="btn paid" data-a="paid" data-id="${t.id}">✓ Reward honoured</button><button class="btn" data-a="active" data-id="${t.id}">Back to active</button>`:t.status==='incomplete'?`<button class="btn" data-a="active" data-id="${t.id}">Reactivate</button>`:'';return `<article class="card"><div class="top"><div><h3>${esc(t.task)}</h3><div class="game">${esc(t.game||'No game name')}</div></div><div class="reward">${money(t.reward)}</div></div><div class="deadline ${dclass(t.deadline)}">${t.status==='active'?'⏱ '+left(t.deadline):statusText(t.status)} · ${new Date(t.deadline).toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'})}</div><div class="prog"><div class="plabel"><span>${t.current} / ${t.target} ${label(t)}</span><span>${pct}%</span></div><div class="bar"><i style="width:${pct}%"></i></div></div>${t.notes?`<div class="notes">${esc(t.notes)}</div>`:''}${logs.length?`<div class="log">${logs.map(x=>`<div><span>+${x.amount}${x.note?' · '+esc(x.note):''}</span><span>${new Date(x.date).toLocaleDateString('en-GB')}</span></div>`).join('')}</div>`:''}<div class="actions">${actions}<button class="btn" data-a="edit" data-id="${t.id}">Edit</button><button class="btn danger" data-a="delete" data-id="${t.id}">Delete</button></div></article>`}
function render(){expire();let a=tasks.filter(t=>t.status==='active'),p=tasks.filter(t=>t.status==='pending'),pd=tasks.filter(t=>t.status==='paid');$('activeCount').textContent=a.length;$('pendingTotal').textContent=money(p.reduce((s,t)=>s+ +t.reward,0));$('activeValue').textContent=money(a.reduce((s,t)=>s+ +t.reward,0));$('paidTotal').textContent=money(pd.reduce((s,t)=>s+ +t.reward,0));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));let visible=tasks.filter(t=>t.status===tab).sort((x,y)=>tab==='active'?new Date(x.deadline)-new Date(y.deadline):new Date(y.updatedAt)-new Date(x.updatedAt));$('list').innerHTML=visible.length?visible.map(card).join(''):`<div class="empty">${({active:'No active rewards. Add one before Freecash invents another impossible deadline.',pending:'Nothing pending.',paid:'No paid rewards logged yet.',incomplete:'Nothing incomplete. Suspiciously competent.'})[tab]}</div>`;document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>act(b.dataset.a,b.dataset.id))}
function openTask(id){$('taskForm').reset();$('taskId').value='';$('dialogTitle').textContent=id?'Edit reward task':'Add reward task';if(id){let t=tasks.find(x=>x.id===id);$('taskId').value=t.id;$('taskName').value=t.task;$('gameName').value=t.game||'';$('reward').value=t.reward;$('type').value=t.type;$('target').value=t.target;$('current').value=t.current;$('deadline').value=inputDate(new Date(t.deadline));$('notes').value=t.notes||''}else{$('target').value=1;$('current').value=0;$('deadline').value=defaultDate()}$('taskDialog').showModal()}
function act(a,id){let t=tasks.find(x=>x.id===id);if(a==='progress'){$('progressForm').reset();$('progressId').value=id;$('amount').value=1;$('progressDialog').showModal();return}if(a==='edit'){openTask(id);return}if(a==='delete'){if(confirm(`Delete "${t.task}"?`)){tasks=tasks.filter(x=>x.id!==id);save();render()}return}t.status=a;t.updatedAt=new Date().toISOString();if(a==='pending')t.completedAt=t.completedAt||new Date().toISOString();if(a==='paid')t.paidAt=new Date().toISOString();save();tab=a;render()}
$('taskForm').onsubmit=e=>{e.preventDefault();let id=$('taskId').value,old=tasks.find(x=>x.id===id),cur=+$('current').value||0,target=+$('target').value||1,t={id:id||uid(),task:$('taskName').value.trim(),game:$('gameName').value.trim(),reward:+$('reward').value||0,type:$('type').value,target,current:cur,deadline:new Date($('deadline').value).toISOString(),notes:$('notes').value.trim(),status:old?.status||(cur>=target?'pending':'active'),log:old?.log||[],createdAt:old?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};if(cur>=target&&t.status==='active')t.status='pending';tasks=old?tasks.map(x=>x.id===id?t:x):[...tasks,t];save();$('taskDialog').close();tab=t.status;render()};
$('progressForm').onsubmit=e=>{e.preventDefault();let t=tasks.find(x=>x.id===$('progressId').value),n=+$('amount').value||0;if(!t||n<1)return;t.current+=n;t.log=t.log||[];t.log.push({amount:n,note:$('progressNote').value.trim(),date:new Date().toISOString()});t.updatedAt=new Date().toISOString();if(t.current>=t.target){t.status='pending';t.completedAt=new Date().toISOString();tab='pending'}save();$('progressDialog').close();render()};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});$('addBtn').onclick=()=>openTask();$('cancelTask').onclick=()=>$('taskDialog').close();$('cancelProgress').onclick=()=>$('progressDialog').close();$('exportBtn').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'}));a.download=`reward-tracker-${new Date().toISOString().slice(0,10)}.json`;a.click()};$('importFile').onchange=async e=>{try{let data=JSON.parse(await e.target.files[0].text());if(!Array.isArray(data))throw 0;tasks=data;save();render();alert('Backup imported.')}catch{alert('That backup could not be read.')}e.target.value=''};if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});setInterval(render,60000);render();
</script>
</body></html>
