<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0d1117"><title>Reward Tracker</title><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg" type="image/svg+xml"><style>:root{--bg:#0d1117;--panel:#151b23;--panel2:#1d2632;--line:#2b3645;--text:#f4f7fb;--muted:#9ba8b7;--green:#79e066;--yellow:#ffd166;--red:#ff7b7b;--blue:#78b7ff;--teal:#78e0c1}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}.app{max-width:820px;margin:auto;padding:18px 14px 110px}.hero,.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.brand{display:flex;gap:12px;align-items:center}.brand img{width:48px;height:48px;border-radius:14px}h1{margin:0;font-size:1.5rem}.sub,.muted{color:var(--muted)}.sub{margin:3px 0 0;font-size:.88rem}.lifetime{text-align:right}.lifetime strong{display:block;color:var(--green);font-size:1.3rem}.lifetime span{font-size:.75rem;color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}.stat,.card{background:var(--panel);border:1px solid var(--line);border-radius:15px}.stat{padding:11px}.stat strong{display:block}.stat span{font-size:.72rem;color:var(--muted)}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px}.search,.select,input,select,textarea{background:#10161d;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:var(--panel);border:1px solid var(--line);padding:4px;border-radius:14px;margin-top:10px;position:sticky;top:8px}.tab{border:0;background:transparent;color:var(--muted);padding:10px 4px;border-radius:10px;font-weight:800;font-size:.78rem}.tab.on{background:var(--panel2);color:var(--text)}#list{display:grid;gap:12px;margin-top:14px}.card{padding:15px;position:relative;overflow:hidden}.card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--green)}.card.warning:before{background:var(--yellow)}.card.danger:before{background:var(--red)}.card.pending:before{background:var(--blue)}.card.paid:before{background:var(--teal)}.card h3{margin:0}.game{font-size:.82rem;color:var(--muted);margin-top:3px}.reward{color:var(--green);font-weight:900}.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.chip{background:var(--panel2);padding:6px 8px;border-radius:999px;font-size:.75rem;color:var(--muted)}.chip.warning{color:var(--yellow)}.chip.danger{color:var(--red)}.progress{margin-top:13px}.labels{display:flex;justify-content:space-between;color:var(--muted);font-size:.8rem;margin-bottom:6px}.bar{height:10px;background:#2a3340;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--green)}.notes,.log{color:var(--muted);font-size:.82rem;margin-top:11px}.log{border-top:1px solid var(--line);padding-top:7px}.log div{display:flex;justify-content:space-between;padding:5px 0}.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:10px;padding:9px 11px;font-weight:800}.btn.primary{background:var(--green);color:#0b1608;border-color:transparent}.btn.paid{background:var(--teal);color:#071613;border-color:transparent}.btn.danger{color:var(--red)}.fab{position:fixed;right:max(18px,calc((100vw - 820px)/2 + 18px));bottom:calc(18px + env(safe-area-inset-bottom));border:0;border-radius:999px;padding:15px 18px;background:var(--green);font-weight:900}.empty{text-align:center;color:var(--muted);padding:35px;border:1px dashed var(--line);border-radius:15px}.tools{display:flex;gap:8px;margin-top:14px}.hidden{display:none}dialog{width:min(94vw,600px);background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:20px;padding:0}dialog::backdrop{background:#000c}.modal{padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field{display:grid;gap:6px}.full{grid-column:1/-1}label{font-size:.79rem;color:var(--muted);font-weight:800}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}textarea{min-height:80px;resize:vertical}@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.toolbar,.grid{grid-template-columns:1fr}.full{grid-column:auto}}</style></head><body><main class="app"><section class="hero"><div class="brand"><img src="icon.svg" alt=""><div><h1>Reward Tracker</h1><p class="sub">Track progress and whether Freecash has paid.</p></div></div><div class="lifetime"><strong id="lifetime">£0.00</strong><span>total tracked</span></div></section><section class="stats"><div class="stat"><strong id="activeValue">£0.00</strong><span>active</span></div><div class="stat"><strong id="pendingValue">£0.00</strong><span>pending</span></div><div class="stat"><strong id="paidValue">£0.00</strong><span>paid</span></div><div class="stat"><strong id="missedValue">£0.00</strong><span>missed</span></div></section><section class="toolbar"><input id="search" class="search" placeholder="Search game or task"><select id="sort" class="select"><option value="urgent">Ending soon</option><option value="reward">Highest reward</option><option value="alpha">A–Z</option></select></section><nav class="tabs"><button class="tab on" data-tab="active">To complete</button><button class="tab" data-tab="pending">Pending</button><button class="tab" data-tab="paid">Paid</button><button class="tab" data-tab="incomplete">Incomplete</button></nav><section id="list"></section><section class="tools"><button class="btn" id="exportBtn">Export backup</button><label class="btn" for="importFile">Import backup</label><input class="hidden" id="importFile" type="file" accept="application/json"></section></main><button class="fab" id="addBtn">＋ New offer</button><dialog id="taskDialog"><form class="modal" id="taskForm"><h2 id="dialogTitle">New offer</h2><input type="hidden" id="taskId"><div class="grid"><div class="field full"><label>Game / offer</label><input id="game" required></div><div class="field full"><label>Task</label><input id="task" required></div><div class="field"><label>Reward (£)</label><input id="reward" type="number" min="0" step="0.01" required></div><div class="field"><label>Counting</label><select id="type"><option value="levels">Levels</option><option value="wins">Tournament wins</option><option value="tasks">Tasks / milestones</option><option value="custom">Custom</option></select></div><div class="field"><label>Target</label><input id="target" type="number" min="1" step="1" value="1" required></div><div class="field"><label>Current progress</label><input id="current" type="number" min="0" step="1" value="0"></div><div class="field full"><label>Days to complete</label><input id="days" type="number" min="1" step="1" value="7" required></div><div class="field full"><label>Notes</label><textarea id="notes"></textarea></div><div class="field full"><label>Proof references</label><textarea id="proof"></textarea></div></div><div class="modal-actions"><button class="btn" type="button" id="cancelTask">Cancel</button><button class="btn primary">Save offer</button></div></form></dialog><script>const KEY='rewardTracker.v2',OLD='rewardTracker.v1',$=id=>document.getElementById(id);let tasks=load(),tab='active';function uid(){return crypto.randomUUID?.()||Date.now()+''+Math.random()}function deadlineFromDays(days,created=new Date()){let d=new Date(created);d.setDate(d.getDate()+Number(days));d.setHours(23,59,59,999);return d.toISOString()}function inferDays(t){if(t.days)return+t.days;if(t.deadline&&t.createdAt)return Math.max(1,Math.ceil((new Date(t.deadline)-new Date(t.createdAt))/864e5));return 7}function norm(x){let days=inferDays(x),created=x.createdAt||new Date().toISOString();return{id:x.id||uid(),game:x.game||x.gameName||'',task:x.task||x.taskName||'',reward:+(x.reward||x.rewardAmount||0),type:x.type||x.progressType||'levels',target:+(x.target||x.targetCount||1),current:+(x.current||x.currentCount||0),days,deadline:x.deadline||deadlineFromDays(days,created),notes:x.notes||'',proof:Array.isArray(x.proof)?x.proof:[],status:x.status||'active',log:x.log||x.progressLog||[],createdAt:created,updatedAt:x.updatedAt||created}}function load(){try{let v=JSON.parse(localStorage.getItem(KEY)||'null');return(v||JSON.parse(localStorage.getItem(OLD)||'[]')).map(norm)}catch{return[]}}function save(){localStorage.setItem(KEY,JSON.stringify(tasks))}function money(n){return new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP'}).format(+n||0)}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function expire(){let changed=false;tasks.forEach(t=>{if(t.status==='active'&&new Date(t.deadline)<Date.now()){t.status='incomplete';changed=true}});if(changed)save()}function left(t){let ms=new Date(t.deadline)-Date.now(),h=Math.ceil(Math.abs(ms)/36e5),d=Math.ceil(Math.abs(ms)/864e5);return ms<0?(h<24?`${h}h overdue`:`${d}d overdue`):(h<=24?`${h}h left`:`${d}d left`)}function urgency(t){let d=(new Date(t.deadline)-Date.now())/864e5;return d<1?'danger':d<3?'warning':'good'}function label(t){return({levels:'levels',wins:'wins',tasks:'tasks',custom:'completed'})[t.type]||'completed'}function stats(){let sum=s=>tasks.filter(t=>t.status===s).reduce((a,t)=>a+t.reward,0);$('activeValue').textContent=money(sum('active'));$('pendingValue').textContent=money(sum('pending'));$('paidValue').textContent=money(sum('paid'));$('missedValue').textContent=money(sum('incomplete'));$('lifetime').textContent=money(tasks.reduce((a,t)=>a+t.reward,0))}function card(t){let pct=Math.min(100,Math.round(t.current/t.target*100)),u=urgency(t),logs=(t.log||[]).slice().reverse().slice(0,4),cls=t.status==='active'?u:t.status,actions=t.status==='active'?`<button class="btn primary" data-a="plus" data-id="${t.id}">Completed +1</button><button class="btn" data-a="pending" data-id="${t.id}">Mark completed</button>`:t.status==='pending'?`<button class="btn paid" data-a="paid" data-id="${t.id}">✓ Reward honoured</button><button class="btn" data-a="active" data-id="${t.id}">Back to active</button>`:t.status==='incomplete'?`<button class="btn" data-a="active" data-id="${t.id}">Reactivate</button>`:'';return `<article class="card ${cls}"><div class="top"><div><h3>${esc(t.task)}</h3><div class="game">${esc(t.game)}</div></div><div class="reward">${money(t.reward)}</div></div><div class="chips"><span class="chip ${u}">${t.status==='active'?left(t):t.status}</span><span class="chip">${t.days}-day offer</span></div><div class="progress"><div class="labels"><span>${t.current} / ${t.target} ${label(t)}</span><span>${pct}%</span></div><div class="bar"><span style="width:${pct}%"></span></div></div>${t.notes?`<div class="notes">${esc(t.notes)}</div>`:''}${logs.length?`<div class="log">${logs.map(x=>`<div><span>${esc(x.note||'Completed +1')}</span><span>${new Date(x.date).toLocaleDateString('en-GB')}</span></div>`).join('')}</div>`:''}<div class="actions">${actions}<button class="btn" data-a="edit" data-id="${t.id}">Edit</button><button class="btn danger" data-a="delete" data-id="${t.id}">Delete</button></div></article>`}function render(){expire();stats();document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));let q=$('search').value.toLowerCase(),list=tasks.filter(t=>t.status===tab&&(`${t.game} ${t.task}`).toLowerCase().includes(q)),s=$('sort').value;list.sort((a,b)=>s==='reward'?b.reward-a.reward:s==='alpha'?a.game.localeCompare(b.game):new Date(a.deadline)-new Date(b.deadline));$('list').innerHTML=list.length?list.map(card).join(''):`<div class="empty">No ${tab} offers.</div>`;document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>act(b.dataset.a,b.dataset.id))}function openTask(id=''){let f=$('taskForm');f.reset();$('taskId').value='';$('dialogTitle').textContent=id?'Edit offer':'New offer';if(id){let t=tasks.find(x=>x.id===id);$('taskId').value=t.id;$('game').value=t.game;$('task').value=t.task;$('reward').value=t.reward;$('type').value=t.type;$('target').value=t.target;$('current').value=t.current;$('days').value=t.days;$('notes').value=t.notes;$('proof').value=(t.proof||[]).join('\n')}else{$('target').value=1;$('current').value=0;$('days').value=7}$('taskDialog').showModal()}function act(a,id){let t=tasks.find(x=>x.id===id);if(a==='plus'){if(t.current<t.target)t.current++;t.log=t.log||[];t.log.push({current:t.current,note:'Completed +1',date:new Date().toISOString()});t.updatedAt=new Date().toISOString();if(t.current>=t.target){t.status='pending';t.completedAt=new Date().toISOString();tab='pending'}save();render();return}if(a==='edit'){openTask(id);return}if(a==='delete'){if(confirm(`Delete "${t.task}"?`)){tasks=tasks.filter(x=>x.id!==id);save();render()}return}t.status=a;t.updatedAt=new Date().toISOString();if(a==='pending')t.completedAt=t.completedAt||new Date().toISOString();if(a==='paid')t.paidAt=new Date().toISOString();save();tab=a;render()}$('taskForm').onsubmit=e=>{e.preventDefault();let id=$('taskId').value,old=tasks.find(x=>x.id===id),days=+$('days').value||1,cur=+$('current').value||0,target=+$('target').value||1,created=old?.createdAt||new Date().toISOString(),t={id:id||uid(),game:$('game').value.trim(),task:$('task').value.trim(),reward:+$('reward').value||0,type:$('type').value,target,current:cur,days,deadline:old&&days===old.days?old.deadline:deadlineFromDays(days,new Date()),notes:$('notes').value.trim(),proof:$('proof').value.split('\n').map(x=>x.trim()).filter(Boolean),status:old?.status||(cur>=target?'pending':'active'),log:old?.log||[],createdAt:created,updatedAt:new Date().toISOString()};if(cur>=target&&t.status==='active')t.status='pending';tasks=old?tasks.map(x=>x.id===id?t:x):[...tasks,t];save();$('taskDialog').close();tab=t.status;render()};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});$('addBtn').onclick=()=>openTask();$('cancelTask').onclick=()=>$('taskDialog').close();$('search').oninput=render;$('sort').onchange=render;$('exportBtn').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'}));a.download=`reward-tracker-${new Date().toISOString().slice(0,10)}.json`;a.click()};$('importFile').onchange=async e=>{try{let data=JSON.parse(await e.target.files[0].text());if(!Array.isArray(data))throw 0;tasks=data.map(norm);save();render();alert('Backup imported.')}catch{alert('That backup could not be read.')}e.target.value=''};if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});setInterval(render,60000);save();render();</script></body></html>
