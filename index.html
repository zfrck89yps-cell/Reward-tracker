<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>Reward Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
:root{--bg:#0d1117;--panel:#151b23;--panel2:#1d2632;--line:#2b3645;--text:#f4f7fb;--muted:#9ba8b7;--green:#79e066;--yellow:#ffd166;--red:#ff7b7b;--blue:#78b7ff;--teal:#78e0c1;--shadow:0 14px 38px rgba(0,0,0,.28)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0d1117,#0a0d12);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}button,input,select,textarea{font:inherit}.app{max-width:840px;margin:auto;padding:18px 14px 110px}.hero{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin:6px 2px 18px}.brand{display:flex;gap:12px;align-items:center}.brand img{width:52px;height:52px;border-radius:14px;box-shadow:var(--shadow)}h1{font-size:1.55rem;margin:0 0 4px}.sub{margin:0;color:var(--muted);font-size:.9rem}.lifetime{text-align:right}.lifetime strong{display:block;color:var(--green);font-size:1.45rem}.lifetime span{font-size:.76rem;color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px}.stat strong{display:block;font-size:1.05rem}.stat span{font-size:.72rem;color:var(--muted)}.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}.filters{display:flex;gap:8px;flex-wrap:wrap}.select,.search{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:11px;padding:10px 11px}.search{min-width:0}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:var(--panel);border:1px solid var(--line);padding:4px;border-radius:14px;position:sticky;top:8px;z-index:5;backdrop-filter:blur(10px)}.tab{border:0;background:transparent;color:var(--muted);padding:10px 4px;border-radius:10px;font-weight:800;font-size:.78rem}.tab.on{background:var(--panel2);color:var(--text)}#list{display:grid;gap:12px;margin-top:14px}.card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--shadow);overflow:hidden}.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--green)}.card.warning::before{background:var(--yellow)}.card.danger::before{background:var(--red)}.card.pending::before{background:var(--blue)}.card.paid::before{background:var(--teal)}.top{display:flex;justify-content:space-between;gap:12px}.titleRow{display:flex;gap:8px;align-items:center}.pin{border:0;background:transparent;color:var(--yellow);font-size:1rem;padding:0}.card h3{margin:0;font-size:1.05rem}.game{color:var(--muted);font-size:.82rem;margin-top:4px}.reward{color:var(--green);font-weight:900}.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.chip{background:var(--panel2);color:var(--muted);padding:6px 8px;border-radius:999px;font-size:.76rem}.chip.warn{color:var(--yellow)}.chip.danger{color:var(--red)}.chip.good{color:var(--green)}.progress{margin-top:13px}.labels{display:flex;justify-content:space-between;color:var(--muted);font-size:.79rem;margin-bottom:6px}.bar{height:10px;border-radius:999px;background:#2a3340;overflow:hidden}.bar span{display:block;height:100%;background:var(--green);border-radius:inherit}.pace{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}.pace div{background:var(--panel2);border-radius:10px;padding:8px}.pace strong{display:block;font-size:.88rem}.pace span{font-size:.68rem;color:var(--muted)}.notes{font-size:.84rem;color:var(--muted);margin-top:11px;line-height:1.4}.log{border-top:1px solid var(--line);margin-top:12px;padding-top:7px}.log div{display:flex;justify-content:space-between;gap:10px;padding:6px 0;color:var(--muted);font-size:.78rem}.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:10px;padding:8px 10px;font-weight:800}.btn.primary{background:var(--green);color:#0b1608;border-color:transparent}.btn.paid{background:var(--teal);color:#071613;border-color:transparent}.btn.danger{color:var(--red)}.empty{text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:18px;padding:36px 20px}.fab{position:fixed;right:max(18px,calc((100vw - 840px)/2 + 18px));bottom:calc(18px + env(safe-area-inset-bottom));border:0;border-radius:999px;padding:15px 18px;background:var(--green);color:#0b1608;font-weight:900;box-shadow:var(--shadow)}.tools{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}.hidden{display:none}dialog{width:min(94vw,600px);background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:20px;padding:0}dialog::backdrop{background:#000c}.modal{padding:18px}.modal h2{margin:0 0 14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field{display:grid;gap:6px}.full{grid-column:1/-1}label{font-size:.79rem;font-weight:800;color:var(--muted)}input,select,textarea{width:100%;background:#0f141b;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:11px}textarea{min-height:82px;resize:vertical}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.overview{margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;color:var(--muted);font-size:.82rem}@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.stats .stat:last-child{grid-column:1/-1}.toolbar{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.full{grid-column:auto}.pace{grid-template-columns:1fr 1fr}.pace div:last-child{grid-column:1/-1}.hero{align-items:center}.brand img{width:46px;height:46px}.lifetime strong{font-size:1.2rem}}
</style>
</head>
<body>
<main class="app">
<section class="hero"><div class="brand"><img src="icon.svg" alt=""><div><h1>Reward Tracker</h1><p class="sub">Deadlines, progress, proof and whether the grind is actually worth it.</p></div></div><div class="lifetime"><strong id="lifetime">£0.00</strong><span>lifetime value</span></div></section>
<section class="stats"><div class="stat"><strong id="activeValue">£0.00</strong><span>active</span></div><div class="stat"><strong id="pendingValue">£0.00</strong><span>pending</span></div><div class="stat"><strong id="paidValue">£0.00</strong><span>paid</span></div><div class="stat"><strong id="missedValue">£0.00</strong><span>missed</span></div><div class="stat"><strong id="successRate">0%</strong><span>success rate</span></div></section>
<section class="toolbar"><input id="search" class="search" placeholder="Search game or task"><div class="filters"><select id="sort" class="select"><option value="urgent">Ending soon</option><option value="reward">Highest reward</option><option value="valueDay">Best value/day</option><option value="alpha">A–Z</option></select></div></section>
<nav class="tabs"><button class="tab on" data-tab="active">To complete</button><button class="tab" data-tab="pending">Pending</button><button class="tab" data-tab="paid">Paid</button><button class="tab" data-tab="incomplete">Incomplete</button></nav>
<section id="list"></section>
<section class="overview" id="overview"></section>
<section class="tools"><button class="btn" id="exportBtn">Export backup</button><label class="btn" for="importFile">Import backup</label><input class="hidden" id="importFile" type="file" accept="application/json"></section>
</main>
<button class="fab" id="addBtn">＋ New offer</button>
<dialog id="taskDialog"><form class="modal" id="taskForm"><h2 id="dialogTitle">New offer</h2><input type="hidden" id="taskId"><div class="grid"><div class="field full"><label>Game / offer</label><input id="game" required placeholder="Bingo Blitz"></div><div class="field full"><label>Task</label><input id="task" required placeholder="Reach level 20"></div><div class="field"><label>Reward (£)</label><input id="reward" type="number" min="0" step="0.01" required></div><div class="field"><label>Counting</label><select id="type"><option value="levels">Levels</option><option value="wins">Cash tournament wins</option><option value="tasks">Tasks / milestones</option><option value="custom">Custom</option></select></div><div class="field"><label>Target</label><input id="target" type="number" min="1" step="1" value="1" required></div><div class="field"><label>Current progress</label><input id="current" type="number" min="0" step="1" value="0"></div><div class="field"><label>Started</label><input id="started" type="date" required></div><div class="field"><label>Deadline</label><input id="deadline" type="datetime-local" required></div><div class="field"><label>Time played (hours)</label><input id="hours" type="number" min="0" step="0.25" value="0"></div><div class="field"><label>Favourite</label><select id="favourite"><option value="false">No</option><option value="true">Yes</option></select></div><div class="field full"><label>Notes</label><textarea id="notes" placeholder="Offer terms, tracking warnings, strategy..."></textarea></div><div class="field full"><label>Proof references</label><textarea id="proof" placeholder="One line per screenshot or note"></textarea></div></div><div class="modal-actions"><button class="btn" type="button" id="cancelTask">Cancel</button><button class="btn primary">Save offer</button></div></form></dialog>
<dialog id="progressDialog"><form class="modal" id="progressForm"><h2>Add progress</h2><input type="hidden" id="progressId"><div class="field"><label>Amount gained</label><input id="amount" type="number" min="1" step="1" value="1" required></div><div class="field" style="margin-top:11px"><label>Time played this session (hours)</label><input id="sessionHours" type="number" min="0" step="0.25" value="0"></div><div class="field" style="margin-top:11px"><label>Note</label><input id="progressNote" placeholder="Reached level 14"></div><div class="modal-actions"><button class="btn" type="button" id="cancelProgress">Cancel</button><button class="btn primary">Add</button></div></form></dialog>
<script>
const KEY='rewardTracker.v2',OLD='rewardTracker.v1',$=id=>document.getElementById(id);let tasks=load(),tab='active';function load(){try{let v=JSON.parse(localStorage.getItem(KEY)||'null');if(v)return v;let old=JSON.parse(localStorage.getItem(OLD)||'[]');return old.map(x=>({id:x.id,game:x.game||x.gameName||'',task:x.task||x.taskName||'',reward:+(x.reward||x.rewardAmount||0),type:x.type||x.progressType||'levels',target:+(x.target||x.targetCount||1),current:+(x.current||x.currentCount||0),started:x.started||x.createdAt?.slice(0,10)||new Date().toISOString().slice(0,10),deadline:x.deadline,hours:+(x.hours||0),favourite:!!x.favourite,notes:x.notes||'',proof:x.proof||[],status:x.status||'active',log:x.log||x.progressLog||[],createdAt:x.createdAt||new Date().toISOString(),updatedAt:x.updatedAt||new Date().toISOString()}))}catch{return[]}}function save(){localStorage.setItem(KEY,JSON.stringify(tasks))}function uid(){return crypto.randomUUID?.()||Date.now()+''+Math.random()}function money(n){return new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP'}).format(+n||0)}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function inputDate(d){let x=new Date(d.getTime()-d.getTimezoneOffset()*60000);return x.toISOString().slice(0,16)}function defaultDeadline(){let d=new Date;d.setDate(d.getDate()+7);d.setHours(23,59,0,0);return inputDate(d)}function expire(){let ch=false;tasks.forEach(t=>{if(t.status==='active'&&new Date(t.deadline)<Date.now()){t.status='incomplete';t.updatedAt=new Date().toISOString();ch=true}});if(ch)save()}function daysLeft(t){return Math.max(0,(new Date(t.deadline)-Date.now())/864e5)}function daysUsed(t){return Math.max(1,(Date.now()-new Date(t.started))/864e5)}function remaining(t){return Math.max(0,t.target-t.current)}function reqPace(t){return remaining(t)/Math.max(.25,daysLeft(t))}function actualPace(t){return t.current/Math.max(1,daysUsed(t))}function valueDay(t){return t.reward/Math.max(.25,daysLeft(t))}function perHour(t){return t.hours>0?t.reward/t.hours:0}function urgency(t){let d=daysLeft(t);return d<1?'danger':d<3?'warning':'good'}function timeText(t){let ms=new Date(t.deadline)-Date.now(),h=Math.ceil(Math.abs(ms)/36e5),d=Math.ceil(Math.abs(ms)/864e5);return ms<0?(h<24?`${h}h overdue`:`${d}d overdue`):(h<=24?`${h}h left`:`${d}d left`)}function label(t){return({levels:'levels',wins:'wins',tasks:'tasks',custom:'completed'})[t.type]||'completed'}function stats(){let sum=s=>tasks.filter(t=>t.status===s).reduce((a,t)=>a+t.reward,0),done=tasks.filter(t=>t.status==='paid').length,miss=tasks.filter(t=>t.status==='incomplete').length,total=done+miss;$('activeValue').textContent=money(sum('active'));$('pendingValue').textContent=money(sum('pending'));$('paidValue').textContent=money(sum('paid'));$('missedValue').textContent=money(sum('incomplete'));$('lifetime').textContent=money(tasks.reduce((a,t)=>a+t.reward,0));$('successRate').textContent=total?Math.round(done/total*100)+'%':'0%';$('overview').textContent=`${tasks.length} offers tracked · ${tasks.filter(t=>t.status==='active').length} active · ${done} paid · ${miss} missed`}function card(t){let pct=Math.min(100,Math.round(t.current/t.target*100)),u=urgency(t),pace=actualPace(t),need=reqPace(t),onTrack=pace>=need,logs=(t.log||[]).slice().reverse().slice(0,4),proof=(t.proof||[]).filter(Boolean),cls=t.status==='active'?u:t.status,actions=t.status==='active'?`<button class="btn primary" data-a="progress" data-id="${t.id}">＋ Progress</button><button class="btn" data-a="pending" data-id="${t.id}">Mark completed</button>`:t.status==='pending'?`<button class="btn paid" data-a="paid" data-id="${t.id}">✓ Reward honoured</button><button class="btn" data-a="active" data-id="${t.id}">Back to active</button>`:t.status==='incomplete'?`<button class="btn" data-a="active" data-id="${t.id}">Reactivate</button>`:'';return `<article class="card ${cls}"><div class="top"><div><div class="titleRow"><button class="pin" data-a="pin" data-id="${t.id}">${t.favourite?'★':'☆'}</button><h3>${esc(t.task)}</h3></div><div class="game">${esc(t.game)}</div></div><div class="reward">${money(t.reward)}</div></div><div class="chips"><span class="chip ${u}">${t.status==='active'?timeText(t):t.status}</span><span class="chip">${remaining(t)} remaining</span>${t.hours?`<span class="chip">${money(perHour(t))}/hr</span>`:''}${proof.length?`<span class="chip">${proof.length} proof note${proof.length===1?'':'s'}</span>`:''}</div><div class="progress"><div class="labels"><span>${t.current} / ${t.target} ${label(t)}</span><span>${pct}%</span></div><div class="bar"><span style="width:${pct}%"></span></div></div>${t.status==='active'?`<div class="pace"><div><strong>${need.toFixed(2)}/day</strong><span>needed</span></div><div><strong>${pace.toFixed(2)}/day</strong><span>current pace</span></div><div><strong>${onTrack?'On track':'Behind'}</strong><span>prediction</span></div></div>`:''}${t.notes?`<div class="notes">${esc(t.notes)}</div>`:''}${logs.length?`<div class="log">${logs.map(x=>`<div><span>+${x.amount}${x.note?' · '+esc(x.note):''}</span><span>${new Date(x.date).toLocaleDateString('en-GB')}</span></div>`).join('')}</div>`:''}<div class="actions">${actions}<button class="btn" data-a="edit" data-id="${t.id}">Edit</button><button class="btn danger" data-a="delete" data-id="${t.id}">Delete</button></div></article>`}function render(){expire();stats();document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));let q=$('search').value.toLowerCase(),list=tasks.filter(t=>t.status===tab&&(`${t.game} ${t.task}`).toLowerCase().includes(q)),s=$('sort').value;list.sort((a,b)=>b.favourite-a.favourite||(s==='reward'?b.reward-a.reward:s==='valueDay'?valueDay(b)-valueDay(a):s==='alpha'?a.game.localeCompare(b.game):new Date(a.deadline)-new Date(b.deadline)));$('list').innerHTML=list.length?list.map(card).join(''):`<div class="empty">No ${tab} offers.</div>`;document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>act(b.dataset.a,b.dataset.id))}function openTask(id=''){let f=$('taskForm');f.reset();$('taskId').value='';$('dialogTitle').textContent=id?'Edit offer':'New offer';if(id){let t=tasks.find(x=>x.id===id);$('taskId').value=t.id;$('game').value=t.game;$('task').value=t.task;$('reward').value=t.reward;$('type').value=t.type;$('target').value=t.target;$('current').value=t.current;$('started').value=t.started;$('deadline').value=inputDate(new Date(t.deadline));$('hours').value=t.hours||0;$('favourite').value=String(!!t.favourite);$('notes').value=t.notes||'';$('proof').value=(t.proof||[]).join('\n')}else{$('target').value=1;$('current').value=0;$('hours').value=0;$('started').value=new Date().toISOString().slice(0,10);$('deadline').value=defaultDeadline()}$('taskDialog').showModal()}function act(a,id){let t=tasks.find(x=>x.id===id);if(a==='progress'){$('progressForm').reset();$('progressId').value=id;$('amount').value=1;$('sessionHours').value=0;$('progressDialog').showModal();return}if(a==='edit'){openTask(id);return}if(a==='delete'){if(confirm(`Delete "${t.task}"?`)){tasks=tasks.filter(x=>x.id!==id);save();render()}return}if(a==='pin'){t.favourite=!t.favourite;t.updatedAt=new Date().toISOString();save();render();return}t.status=a;t.updatedAt=new Date().toISOString();if(a==='pending')t.completedAt=t.completedAt||new Date().toISOString();if(a==='paid')t.paidAt=new Date().toISOString();save();tab=a;render()}$('taskForm').onsubmit=e=>{e.preventDefault();let id=$('taskId').value,old=tasks.find(x=>x.id===id),cur=+$('current').value||0,target=+$('target').value||1,t={id:id||uid(),game:$('game').value.trim(),task:$('task').value.trim(),reward:+$('reward').value||0,type:$('type').value,target,current:cur,started:$('started').value,deadline:new Date($('deadline').value).toISOString(),hours:+$('hours').value||0,favourite:$('favourite').value==='true',notes:$('notes').value.trim(),proof:$('proof').value.split('\n').map(x=>x.trim()).filter(Boolean),status:old?.status||(cur>=target?'pending':'active'),log:old?.log||[],createdAt:old?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};if(cur>=target&&t.status==='active')t.status='pending';tasks=old?tasks.map(x=>x.id===id?t:x):[...tasks,t];save();$('taskDialog').close();tab=t.status;render()};$('progressForm').onsubmit=e=>{e.preventDefault();let t=tasks.find(x=>x.id===$('progressId').value),n=+$('amount').value||0;if(!t||n<1)return;t.current+=n;t.hours+=(+$('sessionHours').value||0);t.log=t.log||[];t.log.push({amount:n,note:$('progressNote').value.trim(),date:new Date().toISOString()});t.updatedAt=new Date().toISOString();if(t.current>=t.target){t.status='pending';t.completedAt=new Date().toISOString();tab='pending'}save();$('progressDialog').close();render()};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});$('addBtn').onclick=()=>openTask();$('cancelTask').onclick=()=>$('taskDialog').close();$('cancelProgress').onclick=()=>$('progressDialog').close();$('search').oninput=render;$('sort').onchange=render;$('exportBtn').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'}));a.download=`reward-tracker-v2-${new Date().toISOString().slice(0,10)}.json`;a.click()};$('importFile').onchange=async e=>{try{let data=JSON.parse(await e.target.files[0].text());if(!Array.isArray(data))throw 0;tasks=data;save();render();alert('Backup imported.')}catch{alert('That backup could not be read.')}e.target.value=''};if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});setInterval(render,60000);render();
</script>
</body></html>
